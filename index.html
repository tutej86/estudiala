<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudiala — Tus estudios médicos</title>
  <meta name="description" content="Tu carpeta médica digital. Guardá todos tus estudios en un solo lugar.">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="screen-login" class="screen active">
    <div class="login-bg">
      <div class="login-grain"></div>
      <div class="login-blob blob-1"></div>
      <div class="login-blob blob-2"></div>
    </div>
    <div class="login-content">
      <div class="login-logo">
        <span class="logo-mark">✦</span>
        <h1 class="logo-name">Estudiala</h1>
      </div>
      <p class="login-tagline">Todos tus estudios médicos<br>en un solo lugar</p>
      <button class="btn-google" id="btn-login">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
        Entrar con Google
      </button>
      <p class="login-fine">Tus datos son privados y solo vos podés verlos</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="screen-app" class="screen">

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo-mark-sm">✦</span>
        <span class="sidebar-logo">Estudiala</span>
      </div>

      <div class="user-card" id="user-card">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Cargando...</div>
          <div class="user-email" id="user-email"></div>
        </div>
      </div>

      <div class="nav-group">
        <button class="nav-item active" data-section="inicio">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
          Inicio
        </button>
        <button class="nav-item" data-section="estudios">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Todos los estudios
        </button>
        <button class="nav-item" data-section="timeline">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><circle cx="12" cy="6" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="18" r="2"/><line x1="12" y1="6" x2="19" y2="6"/><line x1="12" y1="12" x2="19" y2="12"/><line x1="12" y1="18" x2="19" y2="18"/></svg>
          Línea de tiempo
        </button>
        <button class="nav-item" data-section="perfil">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Perfil médico
        </button>
        <button class="nav-item" data-section="subir">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Subir estudio
        </button>
      </div>

      <div class="nav-divider-label">Por tipo</div>
      <div class="nav-group">
        <button class="nav-item" data-section="estudios" data-filter="Laboratorio">
          <span class="nav-dot dot-lab"></span> Laboratorio
        </button>
        <button class="nav-item" data-section="estudios" data-filter="Imágenes">
          <span class="nav-dot dot-img"></span> Imágenes
        </button>
        <button class="nav-item" data-section="estudios" data-filter="Informe">
          <span class="nav-dot dot-inf"></span> Informes
        </button>
        <button class="nav-item" data-section="estudios" data-filter="Receta">
          <span class="nav-dot dot-rx"></span> Recetas
        </button>
        <button class="nav-item" data-section="estudios" data-filter="Nota">
          <span class="nav-dot dot-nota"></span> Notas
        </button>
      </div>

      <div class="sidebar-footer">
        <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
      </div>
    </nav>

    <!-- MAIN -->
    <div class="main-area">
      <header class="topbar">
        <button class="btn-menu" id="btn-menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-title" id="topbar-title">Inicio</div>
        <div class="search-box" id="search-box" style="display:none">
          <input type="text" id="search-input" class="search-input" placeholder="Buscar estudios...">
        </div>
        <button class="btn-upload-top" id="btn-upload-top">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Subir
        </button>
      </header>

      <div class="content-area" id="content-area">
        <!-- Dynamic content goes here -->
      </div>
    </div>

  </div>

  <!-- DETAIL PANEL OVERLAY -->
  <div class="panel-overlay" id="panel-overlay">
    <div class="detail-panel" id="detail-panel"></div>
  </div>

  <!-- SHARE MODAL -->
  <div class="modal-overlay" id="share-modal">
    <div class="modal-box" id="share-box"></div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Firebase -->
  <script type="module" src="/src/app.js"></script>
</body>
</html>
